# Recipeasy — drop this file in /etc/nginx/sites-available/recipeasy
# then: sudo ln -s /etc/nginx/sites-available/recipeasy /etc/nginx/sites-enabled/recipeasy
# then: sudo certbot --nginx -d recipeasy.benjaminallanking.com -d api.recipeasy.benjaminallanking.com
# then: sudo nginx -t && sudo systemctl reload nginx

# API
server {
    listen 80;
    server_name api.recipeasy.benjaminallanking.com;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Frontend (PWA)
server {
    listen 80;
    server_name recipeasy.benjaminallanking.com;

    root /var/www/recipeasy;
    index index.html;

    # Serve uploaded recipe images
    location /images/ {
        alias /home/benjamin/recipeasy/infra/images/;
    }

    # SPA fallback — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
